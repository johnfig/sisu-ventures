<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sisu Ventures</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #0B0420; color: #F5EFFF;
    font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased;
    scroll-behavior: smooth; overflow-x: hidden;
  }
  *, *::before, *::after { box-sizing: border-box; }
  ::selection { background: #FF3DA5; color: #0B0420; }
  @keyframes auroraPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.85); } }
  @keyframes auroraScrollHint { 0% { transform: scaleY(0); transform-origin: top; } 50% { transform: scaleY(1); transform-origin: top; } 51% { transform: scaleY(1); transform-origin: bottom; } 100% { transform: scaleY(0); transform-origin: bottom; } }
  /* nicer scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(245,239,255,0.12); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(245,239,255,0.22); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="aurora/lib.jsx"></script>
<script type="text/babel" src="aurora/atmosphere.jsx"></script>
<script type="text/babel" src="aurora/nav.jsx"></script>
<script type="text/babel" src="aurora/hero.jsx"></script>
<script type="text/babel" src="aurora/sections.jsx"></script>

<script type="text/babel">
  const App = () => {
    const ref = React.useRef(null);
    const t = window.useTime();
    const mouse = window.useMouse(ref);
    return (
      <div ref={ref} style={{ position: "relative", minHeight: "100vh" }}>
        <window.AuroraAtmosphere t={t} mouse={mouse} />
        <window.AuroraNav t={t} />
        <div style={{ position: "relative", zIndex: 5 }}>
          <window.AuroraHero t={t} mouse={mouse} />
          <window.AuroraAbout t={t} />
          <window.AuroraPortfolio t={t} />
          <window.AuroraFounder t={t} />
          <window.AuroraContact t={t} />
        </div>
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
